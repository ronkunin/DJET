    <script>
        document.addEventListener('DOMContentLoaded', buildSite);
        
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const isMobile = newWidth < 768;
            const wasDesktop = !document.body.classList.contains('mobile-layout');
            
            if (isMobile && wasDesktop) {
                location.reload();
            } else if (!isMobile && document.body.classList.contains('mobile-layout')) {
                location.reload();
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Fireworks canvas effect
            document.body.insertAdjacentHTML('afterbegin', `<canvas id="canvas" style="display: block; position: fixed; width: 100%; top: 0; left: 0; z-index: -1;"></canvas>`);

            const canvas = document.getElementById('canvas');
            const ctx2 = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let mouseX = null;
            let mouseY = null;
            const fireworks = [];

            function createFirework(x, y) {
                for (let i = 0; i < 10; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 3;
                    fireworks.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        alpha: 1,
                        size: Math.random() * 3 + 1
                    });
                }
            }

            function drawFireworks() {
                for (let i = fireworks.length - 1; i >= 0; i--) {
                    const fw = fireworks[i];
                    ctx2.beginPath();
                    ctx2.arc(fw.x, fw.y, fw.size || 2, 0, Math.PI * 2);
                    ctx2.globalAlpha = fw.alpha;
                    ctx2.fill();

                    ctx2.shadowBlur = 10;
                    ctx2.fill();
                    ctx2.shadowBlur = 0;

                    ctx2.globalAlpha = 1.0;
                    fw.x += fw.vx;
                    fw.y += fw.vy;
                    fw.vy += 0.1;
                    fw.alpha -= 0.001;
                    if (fw.alpha <= 0) fireworks.splice(i, 1);
                }
            }

            function animate() {
                const bgColor = getComputedStyle(document.body).getPropertyValue('--glass-bg2');
                ctx2.fillStyle = bgColor;
                ctx2.fillRect(0, 0, canvas.width, canvas.height);
                ctx2.fillStyle = 'rgba(166, 125, 217, 0.5)';

                drawFireworks();
                requestAnimationFrame(animate);
            }

            document.addEventListener('click', e => createFirework(e.clientX, e.clientY));

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            window.addEventListener('mouseout', () => {
                mouseX = null;
                mouseY = null;
            });

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            animate();
    </script>
