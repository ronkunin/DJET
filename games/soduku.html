<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sudoku</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="general/new_loader.css">
    <script src="general/loader.js" defer></script>
    <script type="module" defer src="general/firebaseRtdb.js"></script>
    <script src="general/game_services.js" defer></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: none;
            color: #e8e6ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px;
            overflow-x: hidden;
        }


        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: opacity 0.35s ease;
        }

        .fade-overlay.active {
            opacity: 1;
        }

        .header {
            text-align: center;
            padding-bottom: 20px;
            width: 100%;
            position: relative;
            margin-top: 20px;
        }

        .title {
            font-size: 4rem;
            font-weight: 900;

            background: linear-gradient(90deg,
                    #8c7bff,
                    #4db8ff,
                    #8c7bff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            color: transparent;

            text-shadow: 0 0 35px rgba(120, 110, 255, 0.4);

            animation: titleShimmer 6s ease-in-out infinite;
        }

        @keyframes titleShimmer {
            0% {
                background-position: 0% 50%;
                text-shadow:
                    0 0 20px rgba(120, 110, 255, 0.4),
                    0 0 40px rgba(120, 110, 255, 0.2);
            }

            50% {
                background-position: 100% 50%;
                text-shadow:
                    0 0 35px rgba(120, 110, 255, 0.7),
                    0 0 60px rgba(120, 110, 255, 0.4);
            }

            100% {
                background-position: 0% 50%;
                text-shadow:
                    0 0 20px rgba(120, 110, 255, 0.4),
                    0 0 40px rgba(120, 110, 255, 0.2);
            }
        }


        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 5px;

            background: linear-gradient(90deg, transparent, #6f5bff, #4db8ff, #6f5bff, transparent);
            border-radius: 5px;

        }


        .container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .game-area {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
            padding-top: 45px;
        }

        .board-container {
            background: rgba(20, 15, 40, 0.7);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(120, 110, 255, 0.25);
            box-shadow:
                0 0 40px rgba(108, 91, 232, 0.25),
                inset 0 0 20px rgba(91, 75, 220, 0.15);

            width: 520px;
            height: 600px;
            animation: boxGlow 2.8s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        #container {
            display: none;
        }

        .board-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 5px;


            background: radial-gradient(circle at center,
                    rgba(120, 110, 255, 0.9) 0%,
                    rgba(120, 110, 255, 0.5) 25%,
                    rgba(120, 110, 255, 0.15) 50%,
                    transparent 100%);

            mask-image: linear-gradient(to right,
                    transparent,
                    black 20%,
                    black 80%,
                    transparent);

            animation: boardGlow 2.8s ease-in-out infinite;
        }


        @keyframes boardGlow {
            0% {
                box-shadow:
                    0 0 10px rgba(120, 110, 255, 0.7),
                    0 0 20px rgba(120, 110, 255, 0.5),
                    0 0 30px rgba(120, 110, 255, 0.3);
                opacity: 0.85;
            }

            50% {
                box-shadow:
                    0 0 22px rgba(120, 110, 255, 1),
                    0 0 40px rgba(120, 110, 255, 0.8),
                    0 0 60px rgba(120, 110, 255, 0.6);
                opacity: 1;
            }

            100% {
                box-shadow:
                    0 0 10px rgba(120, 110, 255, 0.7),
                    0 0 20px rgba(120, 110, 255, 0.5),
                    0 0 30px rgba(120, 110, 255, 0.3);
                opacity: 0.85;
            }
        }


        .game-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 2px;

            background: #1a1533;
            padding: 3px;
            border-radius: 12px;

            width: 460px;
            height: 460px;
        }

        .cell {
            background: #120f24;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.45rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            color: #dcd3ff;
            transition: all 0.2s ease;
            user-select: none;
            position: relative;
            box-shadow: inset 0 0 8px rgba(91, 75, 220, 0.25);
        }

        .cell:hover {
            background: #1f1844;
            transform: scale(1.05);
        }

        @keyframes boxGlow {
            0% {
                box-shadow:
                    0 0 6px rgba(120, 110, 255, 0.22),
                    0 0 12px rgba(120, 110, 255, 0.12),
                    inset 0 0 6px rgba(120, 110, 255, 0.12);
                border-color: rgba(120, 110, 255, 0.22);
                opacity: 0.92;
            }

            50% {
                box-shadow:
                    0 0 14px rgba(120, 110, 255, 0.38),
                    0 0 26px rgba(120, 110, 255, 0.22),
                    inset 0 0 10px rgba(120, 110, 255, 0.18);
                border-color: rgba(120, 110, 255, 0.38);
                opacity: 1;
            }

            100% {
                box-shadow:
                    0 0 6px rgba(120, 110, 255, 0.22),
                    0 0 12px rgba(120, 110, 255, 0.12),
                    inset 0 0 6px rgba(120, 110, 255, 0.12);
                border-color: rgba(120, 110, 255, 0.22);
                opacity: 0.92;
            }
        }

        @keyframes boardGlow {
            0% {
                opacity: 0.7;
                filter: blur(2px);
            }

            50% {
                opacity: 1;
                filter: blur(3px);
            }

            100% {
                opacity: 0.7;
                filter: blur(2px);
            }
        }


        @keyframes titleGlow {
            0% {
                box-shadow:
                    0 0 10px rgba(120, 110, 255, 0.7),
                    0 0 20px rgba(120, 110, 255, 0.5),
                    0 0 30px rgba(120, 110, 255, 0.3);
                opacity: 0.85;
            }

            50% {
                box-shadow:
                    0 0 22px rgba(120, 110, 255, 1),
                    0 0 40px rgba(120, 110, 255, 0.8),
                    0 0 60px rgba(120, 110, 255, 0.6);
                opacity: 1;
            }

            100% {
                box-shadow:
                    0 0 10px rgba(120, 110, 255, 0.7),
                    0 0 20px rgba(120, 110, 255, 0.5),
                    0 0 30px rgba(120, 110, 255, 0.3);
                opacity: 0.85;
            }
        }


        .cell.fixed {
            color: #6ea8ff;
            font-weight: 800;
            text-shadow: 0 0 6px rgba(110, 168, 255, 0.4);
        }


        .cell.correct {
            background: #120f24 !important;
            color: #ffffff !important;
            font-weight: 900;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
            box-shadow:
                0 0 10px rgba(255, 255, 255, 0.25),
                inset 0 0 8px rgba(255, 255, 255, 0.15) !important;
        }


        .cell.error,
        .cell.selected.error,
        .cell.related.error {
            background: rgba(255, 40, 40, 0.55) !important;
            color: #ffe6e6 !important;
            font-weight: 900;
            box-shadow:
                0 0 15px rgba(255, 60, 60, 0.9),
                inset 0 0 12px rgba(255, 60, 60, 0.6) !important;
        }


        .cell.selected:not(.error):not(.correct) {
            background: #2a2350 !important;
            transform: scale(1.07);
            box-shadow:
                0 0 15px rgba(120, 110, 255, 0.4),
                inset 0 0 10px rgba(120, 110, 255, 0.25) !important;
            border: 1px solid rgba(140, 120, 255, 0.4);
        }

        .cell.related:not(.selected):not(.error):not(.correct) {
            background: #1c1930 !important;
            box-shadow: inset 0 0 6px rgba(120, 110, 255, 0.25) !important;
            filter: brightness(1.08);
        }


        .same-number:not(.error) {
            background: #2f275c !important;
            box-shadow: 0 0 12px rgba(140, 120, 255, 0.4) !important;
            filter: brightness(1.15);
        }

        .thick-right {
            border-right: 3px solid #4db8ff;
        }

        .thick-bottom {
            border-bottom: 3px solid #4db8ff;
        }


        .controls {
            background: rgba(20, 15, 40, 0.7);
            padding: 30px;
            border-radius: 20px;
            width: 330px;
            border: 1px solid rgba(120, 110, 255, 0.25);
            box-shadow:
                0 0 35px rgba(108, 91, 232, 0.25),
                inset 0 0 15px rgba(91, 75, 220, 0.15);
            animation: boxGlow 2.8s ease-in-out infinite;
            height: 600px;
            position: relative;
        }

        .controls::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 5px;

            background: radial-gradient(circle at center,
                    rgba(120, 110, 255, 0.9) 0%,
                    rgba(120, 110, 255, 0.5) 25%,
                    rgba(120, 110, 255, 0.15) 50%,
                    transparent 100%);


            mask-image: linear-gradient(to right,
                    transparent,
                    black 20%,
                    black 80%,
                    transparent);

            animation: boardGlow 2.8s ease-in-out infinite;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #1a1533, #120f24);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(120, 110, 255, 0.25);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #4db8ff, #8c7bff);
            -webkit-background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #a89ce8;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .level-selector h3 {
            color: #4db8ff;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            direction: rtl;
        }

        .level-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            max-height: 400px;
            overflow-y: scroll;
            direction: rtl;
            padding-left: 15px;
            margin-left: -10px;
            width: calc(100% + 20px);


        }


        .level-buttons::-webkit-scrollbar {
            width: 10px;

        }

        .level-buttons::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4db8ff, #8c7bff);
            border-radius: 10px;

        }


        .level-btn {
            background: #1a1533;
            color: #a89ce8;
            border: 1px solid rgba(120, 110, 255, 0.25);
            border-radius: 10px;
            padding: 14px 5px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }


        .level-btn.unlocked:hover {
            background: #2a1f66;
            transform: translateY(-3px);
            box-shadow: 0 0 18px rgba(108, 91, 232, 0.35);
            color: #fff;
        }


        .level-btn.current {
            background: linear-gradient(135deg, #4db8ff, #8c7bff);
            color: white;
            box-shadow: 0 0 22px rgba(120, 110, 255, 0.45);
        }


        .level-btn.current:hover {
            background: linear-gradient(135deg, #6fd0ff, #a48cff);
            transform: translateY(-3px);
            box-shadow: 0 0 28px rgba(120, 110, 255, 0.6);
            color: white;
        }


        .level-btn.locked {
            background: #0d0a18;
            color: #4f467a;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .win-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 8, 20, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
            z-index: 1000;
        }

        .popup-content {
            background: linear-gradient(135deg, #1a1533, #120f24);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(120, 110, 255, 0.25);
            box-shadow: 0 0 40px rgba(108, 91, 232, 0.3);
        }

        .popup-content h2 {
            font-size: 2.8rem;
            background: linear-gradient(90deg, #4db8ff, #8c7bff);
            -webkit-background-clip: text;
            color: transparent;
        }

        .popup-content p {
            color: #cfc7ff;
            margin-bottom: 20px;
        }

        .popup-btn {
            background: linear-gradient(135deg, #4db8ff, #8c7bff);
            color: white;
            border: none;
            padding: 18px 35px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .popup-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(120, 110, 255, 0.4);
        }

        .popup-btn.secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

    <div class="container" id="container">
        <div class="header">
            <h1 class="title">SUDOKU</h1>
        </div>

        <div class="game-area">
            <div class="board-container">
                <div class="game-board" id="gameBoard"></div>
            </div>

            <div class="controls">
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-value" id="currentLevel">1</div>
                        <div class="stat-label">שלב</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="completedLevels">0</div>
                        <div class="stat-label">הושלמו</div>
                    </div>
                </div>

                <div class="level-selector">
                    <h3><i class="fas fa-layer-group"></i> בחירת שלב</h3>
                    <div class="level-buttons" id="levelButtons"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="win-popup" id="winPopup">
        <div class="popup-content">
            <h2><i class="fas fa-trophy"></i> !ניצחון</h2>
            <p id="completionMessage">!שלב הושלם בהצלחה</p>

            <div class="stats" style="margin: 30px 0;">
                <div class="stat-box">
                    <div class="stat-value" id="winLevel">1</div>
                    <div class="stat-label">שלב</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="winCompleted">0</div>
                    <div class="stat-label">השולמו</div>
                </div>
            </div>

            <div class="popup-buttons">
                <button class="popup-btn" id="nextLevelBtn">שלב הבא</button>
                <button class="popup-btn secondary" id="closePopupBtn">סגירה</button>
            </div>
        </div>
    </div>

    <div class="fade-overlay" id="fadeOverlay"></div>

</body>

    function showScreen() {
        if(user_details["soduku_level"] == 0) user_details["soduku_level"] = 1;
        gameState.completedLevels = user_details["soduku_level"] - 1;
        gameState.currentLevel = user_details["soduku_level"];
        initGame();
        document.getElementById("container").style.display = "block";

    }

    gameState.puzzles = gameState.str.replace(/\s+/g, '').split(",");

    const gameBoard = document.getElementById('gameBoard');
    const levelButtons = document.getElementById('levelButtons');
    const currentLevelDisplay = document.getElementById('currentLevel');
    const completedLevelsDisplay = document.getElementById('completedLevels');
    const winPopup = document.getElementById('winPopup');
    const nextLevelBtn = document.getElementById('nextLevelBtn');
    const closePopupBtn = document.getElementById('closePopupBtn');
    const completionMessage = document.getElementById('completionMessage');
    const winLevel = document.getElementById('winLevel');
    const winCompleted = document.getElementById('winCompleted');
    const fadeOverlay = document.getElementById('fadeOverlay');



    function initGame() {
        createGameBoard();
        createLevelButtons();
        loadPuzzle(gameState.currentLevel);

        nextLevelBtn.addEventListener('click', nextLevel);
        closePopupBtn.addEventListener('click', () => winPopup.style.display = 'none');
        document.addEventListener('keydown', handleKeyDown);

        updateLevelDisplay();
    }


    function createGameBoard() {
        gameBoard.innerHTML = '';

        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = r;
                cell.dataset.col = c;

                if (c === 2 || c === 5) cell.classList.add('thick-right');
                if (r === 2 || r === 5) cell.classList.add('thick-bottom');

                cell.addEventListener('click', () => selectCell(r, c));

                gameBoard.appendChild(cell);
            }
        }
    }


    function createLevelButtons() {
        levelButtons.innerHTML = '';

        for (let i = 1; i <= gameState.puzzles.length; i++) {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.textContent = i;
            btn.dataset.level = i;

            if (i <= gameState.completedLevels + 1) btn.classList.add('unlocked');
            else btn.classList.add('locked');

            if (i === gameState.currentLevel) btn.classList.add('current');

            btn.addEventListener('click', () => {
                if (i <= gameState.completedLevels + 1) selectLevel(i);
            });

            levelButtons.appendChild(btn);
        }
    }


    function loadPuzzle(level) {
        gameState.board = [];
        gameState.fixedCells = [];
        gameState.errors = [];
        gameState.selectedCell = null;

        if (gameState.solvedBoards[level]) {
            gameState.board = gameState.solvedBoards[level].map(row => [...row]);
        } else {
            const puzzleString = gameState.puzzles[level - 1];

            for (let r = 0; r < 9; r++) {
                const row = [];
                for (let c = 0; c < 9; c++) {
                    const ch = puzzleString.charAt(r * 9 + c);
                    row.push(ch === '.' ? 0 : parseInt(ch));
                }
                gameState.board.push(row);
            }
        }

        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                if (gameState.board[r][c] !== 0) {
                    gameState.fixedCells.push(`${r},${c}`);
                }
            }
        }

        renderBoard();
    }

    function renderBoard() {


        document.querySelectorAll('.cell').forEach(cell => {
            cell.className = 'cell';
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);

            if (c === 2 || c === 5) cell.classList.add('thick-right');
            if (r === 2 || r === 5) cell.classList.add('thick-bottom');

            const value = gameState.board[r][c];
            const key = `${r},${c}`;

            cell.textContent = value === 0 ? '' : value;
            if (gameState.fixedCells.includes(key)) {
                cell.classList.add('fixed');
            }

            if (gameState.errors.includes(key)) {
                cell.classList.add('error');
            }

            if (
                value !== 0 &&
                !gameState.fixedCells.includes(key) &&
                !gameState.errors.includes(key)
            ) {
                cell.classList.add('correct');
            }
        });


        if (gameState.selectedCell) {
            const { row, col } = gameState.selectedCell;
            const selectedCell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            if (selectedCell) selectedCell.classList.add('selected');

            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const sameRow = r === row;
                    const sameCol = c === col;
                    const sameBox =
                        Math.floor(r / 3) === Math.floor(row / 3) &&
                        Math.floor(c / 3) === Math.floor(col / 3);

                    if (sameRow || sameCol || sameBox) {
                        const relatedCell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                        if (relatedCell) relatedCell.classList.add('related');
                    }
                }
            }
        }
    }


    function highlightSameNumbers(value) {
        document.querySelectorAll('.cell').forEach(cell => {
            cell.classList.remove('same-number');
        });

        if (!value || value === 0) return;

        document.querySelectorAll('.cell').forEach(cell => {
            if (cell.textContent == value) {
                cell.classList.add('same-number');
            }
        });
    }

    function selectCell(row, col) {
        gameState.selectedCell = { row, col };
        renderBoard();

        const value = gameState.board[row][col];
        highlightSameNumbers(value);
    }

    function fillCell(number) {
        if (!gameState.selectedCell) return;

        const { row, col } = gameState.selectedCell;

        if (gameState.fixedCells.includes(`${row},${col}`)) return;

        gameState.board[row][col] = number;

        validateBoard();
        renderBoard();
        highlightSameNumbers(number);

        if (isPuzzleSolved()) showWinPopup();
    }


    function clearSelectedCell() {
        if (!gameState.selectedCell) return;

        const { row, col } = gameState.selectedCell;

        if (gameState.fixedCells.includes(`${row},${col}`)) return;

        gameState.board[row][col] = 0;

        validateBoard();
        renderBoard();
        highlightSameNumbers(0);
    }

    function validateBoard() {
        gameState.errors = [];

        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const value = gameState.board[r][c];
                if (value === 0) continue;

                for (let x = 0; x < 9; x++) {
                    if (x !== c && gameState.board[r][x] === value) {
                        gameState.errors.push(`${r},${c}`, `${r},${x}`);
                    }
                }

                for (let y = 0; y < 9; y++) {
                    if (y !== r && gameState.board[y][c] === value) {
                        gameState.errors.push(`${r},${c}`, `${y},${c}`);
                    }
                }

                const boxR = Math.floor(r / 3) * 3;
                const boxC = Math.floor(c / 3) * 3;

                for (let br = boxR; br < boxR + 3; br++) {
                    for (let bc = boxC; bc < boxC + 3; bc++) {
                        if ((br !== r || bc !== c) && gameState.board[br][bc] === value) {
                            gameState.errors.push(`${r},${c}`, `${br},${bc}`);
                        }
                    }
                }
            }
        }

        gameState.errors = [...new Set(gameState.errors)];
    }

    function isPuzzleSolved() {
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                if (gameState.board[r][c] === 0) return false;
            }
        }
        return gameState.errors.length === 0;
    }


    function showWinPopup() {
        fadeOverlay.classList.add('active');

        gameState.gameOver = true;



        setTimeout(() => {
            winPopup.style.display = 'flex';
            gameState.solvedBoards[gameState.currentLevel] =
                gameState.board.map(row => [...row]);

            if (gameState.completedLevels < gameState.currentLevel) {
                gameState.completedLevels = gameState.currentLevel;
                user_details["soduku_level"] = gameState.currentLevel + 1;
                addTransactionOnSP(20, "פתירת לוח סודוקו");
                updateSPValueInList1("Users", "soduku_level", user_details["Id"], user_details["soduku_level"]);
                if(gameState.currentLevel + 1 % 5 == 0)
                    saveActivityOnSP(`התקדם בסודוקו והגיע לשלב ${gameState.currentLevel + 1}`, "level_up");
            }

            completionMessage.textContent = `Level ${gameState.currentLevel} completed!`;
            winLevel.textContent = gameState.currentLevel;
            winCompleted.textContent = gameState.completedLevels;

            updateLevelDisplay();

            fadeOverlay.classList.remove('active');

        }, 350);
    }

    function nextLevel() {
        if (gameState.currentLevel < gameState.puzzles.length) {
            gameState.currentLevel++;
            loadPuzzle(gameState.currentLevel);
            winPopup.style.display = 'none';
            updateLevelDisplay();
        } else {
            winPopup.style.display = 'none';
        }
        gameState.gameOver = false;


    }

    function selectLevel(level) {
        gameState.currentLevel = level;
        loadPuzzle(level);
        updateLevelDisplay();
    }

    function updateLevelDisplay() {
        currentLevelDisplay.textContent = gameState.currentLevel;
        completedLevelsDisplay.textContent = gameState.completedLevels;

        document.querySelectorAll('.level-btn').forEach(btn => {
            const lvl = parseInt(btn.dataset.level);

            btn.classList.remove('current', 'locked', 'unlocked');

            if (lvl === gameState.currentLevel) btn.classList.add('current');

            if (lvl <= gameState.completedLevels + 1) {
                btn.classList.add('unlocked');
            } else {
                btn.classList.add('locked');
            }
        });
    }

    function handleKeyDown(e) {
        if (!gameState.selectedCell) return;

        const { row, col } = gameState.selectedCell;

        if (e.key >= '1' && e.key <= '9') {
            fillCell(parseInt(e.key));
            return;
        }

        if (e.key === 'Backspace' || e.key === 'Delete') {
            clearSelectedCell();
            return;
        }

        if (e.key === 'ArrowUp') selectCell(Math.max(0, row - 1), col);
        if (e.key === 'ArrowDown') selectCell(Math.min(8, row + 1), col);
        if (e.key === 'ArrowLeft') selectCell(row, Math.max(0, col - 1));
        if (e.key === 'ArrowRight') selectCell(row, Math.min(8, col + 1));

        if (e.key === ' ') clearSelectedCell();
    }

    document.addEventListener('DOMContentLoaded', initGame);
</script>
